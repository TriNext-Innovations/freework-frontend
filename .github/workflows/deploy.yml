name: CI / CD — Frontend

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

# Branch → environment mapping:
#   develop → CI only (dev is local; no cloud deploy)
#   staging → Cloudflare Pages (staging.freework.co.za) — talks to api-staging.freework.co.za
#   main    → CI only FOR NOW. Prod frontend is deferred until the prod backend
#             (api.freework.co.za) exists; otherwise we'd publish a UI that can't
#             reach an API. When prod is ready, add a Cloudflare Pages prod deploy.

env:
  # Node 24 (npm 11) matches the version the committed package-lock.json was
  # generated with; Node 20 (npm 10) rejects the lock as out of sync. Also clears
  # the Node-20 GitHub Actions deprecation. Angular 20 supports Node 24.
  NODE_VERSION: '24'

jobs:
  # ── CI: runs on every push and PR ────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Resolve Angular build configuration
        id: cfg
        run: |
          case "${{ github.ref }}" in
            refs/heads/main)    echo "angular_config=production" >> "$GITHUB_OUTPUT" ;;
            refs/heads/staging) echo "angular_config=staging"    >> "$GITHUB_OUTPUT" ;;
            *)                  echo "angular_config=staging"     >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build
        run: npm run build -- --configuration ${{ steps.cfg.outputs.angular_config }}

  # ── Deploy: staging (staging → Cloudflare Pages → staging.freework.co.za) ────
  # Requires GitHub secrets (staging environment):
  #   CLOUDFLARE_API_TOKEN   — token with Account → Cloudflare Pages: Edit
  #   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
  # The project is auto-created on first run; map staging.freework.co.za to it in
  # the Cloudflare dashboard (Pages → custom domains) once.
  deploy-staging:
    name: Deploy → Staging (Cloudflare Pages)
    needs: lint-and-build
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run build -- --configuration staging

      - name: Ensure Cloudflare Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create freework-frontend-staging --production-branch=staging

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/angular-app/browser --project-name=freework-frontend-staging --branch=staging
