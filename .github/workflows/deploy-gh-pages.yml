name: Deploy GitHub Pages (gh-pages branch)

on:
  push:
    branches: ["main", "feature/api-live-test"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Copy 404 fallback
        run: cp dist/angular-app/browser/index.html dist/angular-app/browser/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/angular-app/browser
          publish_branch: gh-pages
          force_orphan: true
          cname: freework.co.za
